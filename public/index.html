<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>背单词 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; 
            background: #F5F5F5; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }
        .container { 
            background: #FFFFFF; 
            padding: 40px 30px; 
            border-radius: 32px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 380px; 
            text-align: center;
            border: 1px solid #E8E8E8;
        }
        h1 { 
            margin-bottom: 30px; 
            color: #4A4A4A; 
            font-size: 28px;
            font-weight: 600;
        }
        input { 
            width: 100%; 
            padding: 14px 16px; 
            margin: 10px 0; 
            border: 1px solid #D9D9D9; 
            border-radius: 30px; 
            font-size: 16px; 
            background: white;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #C6C7C6;
            box-shadow: 0 0 0 3px rgba(158, 158, 158, 0.1);
        }
        button { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            background: #9E9E9E; 
            color: white; 
            border: none; 
            border-radius: 40px; 
            font-size: 16px; 
            font-weight: 500;
            cursor: pointer; 
            transition: all 0.2s;
        }
        button:hover { 
            background: #898989; 
        }
        .switch-btn { 
            background: #E8E8E8; 
            color: #4A4A4A;
        }
        .switch-btn:hover {
            background: #D9D9D9;
        }
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 24px; }
            input, button { padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 背单词</h1>
        <div id="loginForm">
            <input type="text" id="loginUsername" placeholder="用户名">
            <input type="password" id="loginPassword" placeholder="密码">
            <button onclick="login()">登录</button>
            <button class="switch-btn" onclick="showRegister()">注册</button>
        </div>
        <div id="registerForm" style="display:none">
            <input type="text" id="regUsername" placeholder="用户名">
            <input type="password" id="regPassword" placeholder="密码">
            <button onclick="register()">注册</button>
            <button class="switch-btn" onclick="showLogin()">返回登录</button>
        </div>
    </div>
    <script>
        const API_URL = 'https://vocabulary-app-production-2f1d.up.railway.app';

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const res = await fetch(API_URL + '/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('isAdmin', data.isAdmin);
                    window.location.href = API_URL + '/home.html';
                } else {
                    alert(data.message);
                }
            } catch(e) {
                alert('网络错误：' + e.message);
            }
        }

        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            try {
                const res = await fetch(API_URL + '/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if(data.success) {
                    alert('注册成功，请登录');
                    showLogin();
                } else {
                    alert(data.message);
                }
            } catch(e) {
                alert('网络错误：' + e.message);
            }
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        }
    </script>
</body>
</html>
